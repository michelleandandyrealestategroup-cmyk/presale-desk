<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Presale Desk</title>
<style>
body{font-family:system-ui;background:#EAECEF;margin:0;padding:20px}
.wrap{max-width:800px;margin:0 auto}
h1{color:#13202A;font-size:22px;margin-bottom:20px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #ddd}
textarea{width:100%;height:150px;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;resize:vertical;box-sizing:border-box}
button{background:#0B6E5F;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px}
button:disabled{opacity:0.5}
#result{margin-top:16px;background:#f5f5f5;padding:15px;border-radius:8px;white-space:pre-wrap;font-size:14px;line-height:1.6}
.error{color:#c00;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎬 Presale Desk</h1>
  <div class="card">
    <p style="margin:0 0 10px;font-weight:600">트랜스크립트 붙여넣기</p>
    <textarea id="txt" placeholder="여기에 유튜브 트랜스크립트 붙여넣기…"></textarea>
    <button id="btn" onclick="analyze()">분석하기</button>
    <div id="result"></div>
  </div>
</div>
<script>
async function analyze(){
  const txt=document.getElementById('txt').value.trim();
  const res=document.getElementById('result');
  const btn=document.getElementById('btn');
  if(!txt){res.textContent='텍스트를 입력하세요.';return;}
  btn.disabled=true;btn.textContent='처리 중…';res.textContent='';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:800,
        messages:[{role:'user',content:'다음 텍스트를 한국어로 요약해줘:\n\n'+txt}]
      })
    });
    const d=await r.json();
    if(d.content&&d.content[0])res.textContent=d.content[0].text;
    else res.textContent=JSON.stringify(d);
  }catch(e){res.innerHTML='<span class="error">❌ '+e.message+'</span>';}
  btn.disabled=false;btn.textContent='분석하기';
}
</script>
</body>
</html>
